<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Márgenes - Growler Garage</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2d3748;
            margin-bottom: 10px;
        }
        .timestamp {
            color: #718096;
            font-size: 14px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card-title {
            font-size: 14px;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        .card-value {
            font-size: 28px;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 5px;
        }
        .card-subvalue {
            font-size: 14px;
            color: #718096;
        }
        .positive { color: #22863a; }
        .negative { color: #cb2431; }
        .warning { color: #d39e00; }

        .chart-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            position: relative;
            height: 400px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e2e8f0;
        }
        tr:hover {
            background: #f7fafc;
        }
        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Dashboard de Márgenes</h1>
            <p class="timestamp">Última actualización: <span id="updated"></span></p>
        </header>

        <div class="grid">
            <div class="card">
                <div class="card-title">Margen Promedio Junio</div>
                <div class="card-value" id="avg-margin">-</div>
                <div class="card-subvalue">Todos los locales</div>
            </div>
            <div class="card">
                <div class="card-title">Local Mejor Margen</div>
                <div class="card-value" id="best-local">-</div>
                <div class="card-subvalue" id="best-margin">-</div>
            </div>
            <div class="card">
                <div class="card-title">Local Peor Margen</div>
                <div class="card-value" id="worst-local">-</div>
                <div class="card-subvalue" id="worst-margin">-</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="marginChart"></canvas>
        </div>

        <div style="background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h2 style="margin-bottom: 20px; color: #2d3748;">Detalle por Local y Mes</h2>
            <table id="marginTable"></table>
        </div>

        <div class="footer">
            <p>🏪 Growler Garage | Sistema de Análisis de Márgenes</p>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('dashboard_margin_data.json');
                const data = await response.json();

                // Actualizar timestamp
                document.getElementById('updated').textContent =
                    new Date(data.last_updated).toLocaleString('es-AR');

                // Procesar datos
                const margins = data.margins;
                const locales = Object.keys(margins);
                const months = ['2026-01', '2026-02', '2026-03', '2026-04', '2026-05', '2026-06'];

                // Gráfico
                const ctx = document.getElementById('marginChart').getContext('2d');
                const datasets = locales.map((local, idx) => {
                    const values = months.map(m => margins[local][m]?.margen_pct || 0);
                    const colors = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b'];
                    return {
                        label: local,
                        data: values,
                        borderColor: colors[idx % colors.length],
                        backgroundColor: colors[idx % colors.length] + '22',
                        tension: 0.4,
                        fill: false
                    };
                });

                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: months.map(m => m.substring(5)),
                        datasets: datasets
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'bottom' }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                title: { display: true, text: 'Margen %' }
                            }
                        }
                    }
                });

                // Estadísticas
                const juneData = locales.map(local => ({
                    local,
                    margen: margins[local]['2026-06']?.margen || 0,
                    margen_pct: margins[local]['2026-06']?.margen_pct || 0
                }));

                const avgMargin = (juneData.reduce((s, d) => s + d.margen_pct, 0) / juneData.length).toFixed(1);
                const best = juneData.reduce((a, b) => a.margen_pct > b.margen_pct ? a : b);
                const worst = juneData.reduce((a, b) => a.margen_pct < b.margen_pct ? a : b);

                document.getElementById('avg-margin').textContent = avgMargin + '%';
                document.getElementById('best-local').textContent = best.local;
                document.getElementById('best-margin').textContent = '$' + best.margen.toLocaleString('es-AR');
                document.getElementById('worst-local').textContent = worst.local;
                document.getElementById('worst-margin').textContent = '$' + worst.margen.toLocaleString('es-AR');

                // Tabla
                const table = document.getElementById('marginTable');
                table.innerHTML = '<tr><th>Local</th><th>Enero</th><th>Febrero</th><th>Marzo</th><th>Abril</th><th>Mayo</th><th>Junio</th></tr>';

                locales.forEach(local => {
                    const row = document.createElement('tr');
                    row.innerHTML = '<td><strong>' + local + '</strong></td>';
                    months.forEach(month => {
                        const m = margins[local][month];
                        const pct = m ? m.margen_pct.toFixed(1) : '-';
                        const cls = m && m.margen_pct < 50 ? 'warning' : m && m.margen_pct < 20 ? 'negative' : 'positive';
                        row.innerHTML += '<td class="' + cls + '">' + pct + '%</td>';
                    });
                    table.appendChild(row);
                });

            } catch (error) {
                console.error('Error cargando datos:', error);
                document.body.innerHTML = '<div style="padding: 40px; color: white; text-align: center;"><h2>⚠️ Error cargando datos</h2><p>' + error.message + '</p></div>';
            }
        }

        loadData();
    </script>
</body>
</html>
